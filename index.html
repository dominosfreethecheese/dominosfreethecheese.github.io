<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Camera Uploads</title>
  <style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body, #app { height: 100%; }
body {
  font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
  background: #fff; color: #000; padding: 12px;
  display: flex; justify-content: center; align-items: flex-start;
}
main { width: 100%; max-width: 900px; }
.controls { background: transparent; padding: 8px; margin-bottom: 8px; }
.input-row { display: flex; gap: 8px; margin-bottom: 8px; }
.input-row input {
  flex: 1; padding: 8px; border: 1px solid #000;
  background: transparent; color: inherit; font-size: 14px; border-radius: 0;
}
.buttons-row { display: flex; gap: 8px; flex-wrap: wrap; }
.btn {
  padding: 8px; border: 1px solid #000; background: transparent;
  color: inherit; cursor: pointer; font-size: 14px; border-radius: 0;
}
.btn input { display: none; }
.btn.danger { border-color: #000; color: #000; }
#gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 8px;
}
.card {
  border: 1px solid #000; background: transparent;
  display: flex; flex-direction: column; min-height: 120px;
  border-radius: 0; overflow: visible;
}
.preview {
  width: 100%; height: 100px; background: #000;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; position: relative;
}
.preview-overlay {
  position: absolute; right: 6px; top: 6px;
  display: flex; gap: 6px; z-index: 2;
  opacity: 0; transform: translateY(-4px);
  transition: opacity 120ms ease, transform 120ms ease;
  pointer-events: none;
}
.preview:hover .preview-overlay,
.preview:focus .preview-overlay,
.preview:focus-within .preview-overlay {
  opacity: 1; transform: translateY(0); pointer-events: auto;
}
.overlays-disabled .preview:hover .preview-overlay,
.overlays-disabled .preview:focus .preview-overlay,
.overlays-disabled .preview:focus-within .preview-overlay {
  opacity: 0 !important; transform: translateY(-4px) !important; pointer-events: none !important;
}
.preview-overlay.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
@media (hover: none) and (pointer: coarse) {
  .preview:focus { outline: none; }
  .preview { -webkit-tap-highlight-color: transparent; }
}
.overlay-btn {
  background: rgba(255,255,255,0.95); border: 1px solid #000;
  padding: 4px; font-size: 14px; cursor: pointer; line-height: 1;
}
#viewerMediaWrap {
  width: 100%; max-height: 60vh;
  display: flex; align-items: center; justify-content: center; overflow: hidden;
}
#viewerMediaWrap video, #viewerMediaWrap img {
  max-width: 100%; max-height: 60vh; width: auto; height: auto;
  object-fit: contain; display: block;
}
#viewerTitle, #viewerUploader {
  max-width: 60vw; overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap; display: block;
}
#viewerUploader { font-size: 13px; color: inherit; opacity: 0.9; }
.preview img, .preview video { width: 100%; height: 100%; object-fit: cover; display: block; }
.meta { padding: 6px; display: flex; justify-content: space-between; gap: 6px; align-items: center; }
.info { min-width: 0; }
.title, .sub { min-width: 0; display: block; }
.title { font-size: 13px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sub { font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: block; }
.actions { display: flex; gap: 6px; }
.action-btn {
  background: transparent; border: 1px solid #000;
  padding: 4px; cursor: pointer; font-size: 14px; border-radius: 0;
}
.empty { padding: 24px; text-align: center; color: #000; border: 1px solid #000; background: transparent; }
.modal {
  position: fixed; inset: 0; display: flex;
  align-items: center; justify-content: center;
  background: rgba(0,0,0,0.6); padding: 8px;
}
.modal.hidden { display: none; }
.modal-content {
  width: 100%; max-width: 720px; background: #fff;
  border: 1px solid #000; padding: 8px; border-radius: 0;
  display: flex; flex-direction: column; gap: 6px;
}
#cameraStream { width: 100%; height: 300px; background: #000; object-fit: cover; }
.camera-controls { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; }
.hidden { display: none; }
#uploadStatus {
  padding: 8px; font-size: 13px; border: 1px solid #000;
  margin-bottom: 8px; display: none;
}
.progress-bar-wrap { height: 4px; background: #eee; margin-top: 4px; }
.progress-bar { height: 4px; background: #000; width: 0%; transition: width 0.2s; }
@media (max-width: 420px) {
  body { padding: 8px; }
  .input-row { flex-direction: column; }
  .preview { height: 80px; }
  #cameraStream { height: 220px; }
}
  </style>
</head>
<body>
  <main id="app">
    <section class="controls">
      <div class="input-row">
        <input id="uploaderName" placeholder="Your name" autocomplete="name" />
        <input id="titleInput" placeholder="Title for next upload" />
      </div>
      <div class="buttons-row">
        <button id="openCameraPhoto" class="btn">📷 Take Photo</button>
        <button id="openCameraVideo" class="btn">🎥 Record Video</button>
        <label class="btn">
          <input id="captureImage" type="file" accept="image/*" capture="environment" />
          ⤓ Upload Photo
        </label>
        <label class="btn">
          <input id="captureVideo" type="file" accept="video/*" capture="camcorder" />
          ⤓ Upload Video
        </label>
        <button id="clearAll" class="btn danger">Delete All</button>
      </div>
    </section>

    <div id="uploadStatus">
      <span id="uploadStatusText">Uploading...</span>
      <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
    </div>

    <section id="gallery" aria-live="polite"></section>
  </main>

  <div id="cameraModal" class="modal hidden" role="dialog" aria-modal="true" aria-label="Camera">
    <div class="modal-content">
      <video id="cameraStream" autoplay playsinline muted></video>
      <canvas id="captureCanvas" class="hidden"></canvas>
      <div class="camera-controls">
        <button id="takePhoto" class="btn">📸 Capture</button>
        <button id="startRecord" class="btn">⏺️ Start</button>
        <button id="stopRecord" class="btn" disabled>⏹️ Stop</button>
        <button id="closeCamera" class="btn">✖ Close</button>
      </div>
    </div>
  </div>

  <div id="viewerModal" class="modal hidden" role="dialog" aria-modal="true" aria-label="Viewer">
    <div class="modal-content">
      <div id="viewerBody" style="display:flex;flex-direction:column;gap:6px;">
        <div id="viewerMediaWrap"></div>
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div>
            <div id="viewerTitle" style="font-weight:600;"></div>
            <div id="viewerUploader" style="font-size:13px;"></div>
          </div>
          <div style="display:flex;gap:8px;">
            <button id="viewerDownload" class="action-btn">⬇️</button>
            <button id="viewerDelete" class="action-btn delete">🗑️</button>
            <button id="viewerClose" class="action-btn">✖</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">

/* ── Config ── */
const CLOUD_NAME    = 'dgk8ldnv0';
const UPLOAD_PRESET = 'freethecheesevideosandphotos';
const UPLOAD_URL    = `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`;

const SUPA_URL  = 'https://prevkpjvlaycoatbpppp.supabase.co';
const SUPA_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByZXZrcGp2bGF5Y29hdGJwcHBwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMzg5NTIsImV4cCI6MjA5NTkxNDk1Mn0.0HfZ6T-S2rTKEvPvzbGkLU4q3WMyFydU1wYCldLYwHk';
const SUPA_HEADERS = {
  'Content-Type': 'application/json',
  'apikey': SUPA_KEY,
  'Authorization': `Bearer ${SUPA_KEY}`
};

/* ── Supabase helpers ── */
async function dbGetAll(){
  const res = await fetch(`${SUPA_URL}/rest/v1/uploads?select=*&order=created_at.desc`, {
    headers: SUPA_HEADERS
  });
  if(!res.ok) throw new Error('Failed to load uploads');
  return res.json();
}

async function dbAdd(entry){
  const res = await fetch(`${SUPA_URL}/rest/v1/uploads`, {
    method: 'POST',
    headers: { ...SUPA_HEADERS, 'Prefer': 'return=representation' },
    body: JSON.stringify({
      public_id: entry.publicId,
      title:     entry.title,
      uploader:  entry.uploader,
      type:      entry.type,
      url:       entry.url,
      created_at: entry.createdAt
    })
  });
  if(!res.ok) throw new Error('Failed to save upload record');
  return res.json();
}

async function dbDelete(publicId){
  const res = await fetch(`${SUPA_URL}/rest/v1/uploads?public_id=eq.${encodeURIComponent(publicId)}`, {
    method: 'DELETE',
    headers: SUPA_HEADERS
  });
  if(!res.ok) throw new Error('Failed to delete record');
}

async function dbClearAll(){
  const res = await fetch(`${SUPA_URL}/rest/v1/uploads?id=neq.00000000-0000-0000-0000-000000000000`, {
    method: 'DELETE',
    headers: SUPA_HEADERS
  });
  if(!res.ok) throw new Error('Failed to clear uploads');
}

/* ── Cloudinary upload ── */
async function uploadToCloudinary(blob, title, uploader, type, onProgress){
  const fd = new FormData();
  fd.append('file', blob);
  fd.append('upload_preset', UPLOAD_PRESET);
  fd.append('context', `title=${encodeURIComponent(title)}|uploader=${encodeURIComponent(uploader)}`);
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open('POST', UPLOAD_URL);
    xhr.upload.onprogress = (e) => {
      if(e.lengthComputable && onProgress) onProgress(e.loaded / e.total);
    };
    xhr.onload = () => {
      if(xhr.status >= 200 && xhr.status < 300){
        const data = JSON.parse(xhr.responseText);
        resolve({ publicId: data.public_id, title, uploader, type, url: data.secure_url, createdAt: Date.now() });
      } else {
        reject(new Error(`Cloudinary upload failed: ${xhr.status}`));
      }
    };
    xhr.onerror = () => reject(new Error('Network error during upload'));
    xhr.send(fd);
  });
}

/* ── UI refs ── */
const uploaderName   = document.getElementById('uploaderName');
const titleInput     = document.getElementById('titleInput');
const captureImage   = document.getElementById('captureImage');
const captureVideo   = document.getElementById('captureVideo');
const openCameraPhoto = document.getElementById('openCameraPhoto');
const openCameraVideo = document.getElementById('openCameraVideo');
const gallery        = document.getElementById('gallery');
const clearAllBtn    = document.getElementById('clearAll');
const uploadStatus   = document.getElementById('uploadStatus');
const uploadStatusText = document.getElementById('uploadStatusText');
const progressBar    = document.getElementById('progressBar');
const cameraModal    = document.getElementById('cameraModal');
const cameraStream   = document.getElementById('cameraStream');
const captureCanvas  = document.getElementById('captureCanvas');
const takePhotoBtn   = document.getElementById('takePhoto');
const startRecordBtn = document.getElementById('startRecord');
const stopRecordBtn  = document.getElementById('stopRecord');
const closeCameraBtn = document.getElementById('closeCamera');
const viewerModal    = document.getElementById('viewerModal');
const viewerMediaWrap = document.getElementById('viewerMediaWrap');
const viewerTitle    = document.getElementById('viewerTitle');
const viewerUploader = document.getElementById('viewerUploader');
const viewerClose    = document.getElementById('viewerClose');
const viewerDownload = document.getElementById('viewerDownload');
const viewerDelete   = document.getElementById('viewerDelete');

const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
let mediaStream = null, mediaRecorder = null, recordedChunks = [], currentMode = 'photo';

function showUploadStatus(text, progress){
  uploadStatus.style.display = 'block';
  uploadStatusText.textContent = text;
  progressBar.style.width = (progress * 100).toFixed(0) + '%';
}
function hideUploadStatus(){
  uploadStatus.style.display = 'none';
  progressBar.style.width = '0%';
}

function el(tag, props={}, ...children){
  const e = document.createElement(tag);
  Object.assign(e, props);
  for(const c of children) if(c!=null) e.append(typeof c==='string'?document.createTextNode(c):c);
  return e;
}

let _activePreviewOverlay = null;
document.addEventListener('click', (e)=>{
  if(!_activePreviewOverlay) return;
  const previewEl = _activePreviewOverlay.closest('.preview');
  if(previewEl && previewEl.contains(e.target)) return;
  _activePreviewOverlay.classList.remove('visible');
  _activePreviewOverlay = null;
}, { passive: true });

function createCard(item){
  const isVideo = item.type === 'video';
  const preview = el('div', {className:'preview', tabIndex: isMobile ? -1 : 0});
  if(isVideo){
    const v = document.createElement('video');
    v.src = item.url; v.controls = false; v.muted = true; v.loop = true; v.playsInline = true;
    v.addEventListener('mouseenter', ()=>v.play());
    v.addEventListener('mouseleave', ()=>v.pause());
    preview.appendChild(v);
  } else {
    const img = document.createElement('img');
    img.src = item.url; img.loading = 'lazy';
    preview.appendChild(img);
  }
  const overlay = el('div', {className:'preview-overlay'});
  const overlayDownload = el('button', {className:'overlay-btn', title:'Download'}, '⬇️');
  const overlayOpen     = el('button', {className:'overlay-btn', title:'Open'},     '🔍');
  const overlayDelete   = el('button', {className:'overlay-btn', title:'Delete'},   '🗑️');
  overlay.append(overlayOpen, overlayDownload, overlayDelete);
  preview.appendChild(overlay);

  const meta = el('div', {className:'meta'},
    el('div', {className:'info'},
      el('div', {className:'title'}, item.title || 'Untitled'),
      el('div', {className:'sub'},   item.uploader || 'Anonymous')
    )
  );
  const card = el('article', {className:'card'});
  card.append(preview, meta);

  overlayDownload.addEventListener('click', (e)=>{
    e.stopPropagation();
    const a = document.createElement('a');
    a.href = item.url;
    a.download = `${(item.title||'capture').replace(/\s+/g,'_')}.${item.type==='video'?'mp4':'jpg'}`;
    a.target = '_blank'; a.click();
  });

  overlayDelete.addEventListener('click', async (e)=>{
    e.stopPropagation();
    if(!confirm('Delete this item?')) return;
    await dbDelete(item.public_id || item.publicId);
    render();
  });

  function openViewer(){ window.dispatchEvent(new CustomEvent('open-viewer', { detail: item })); }
  overlayOpen.addEventListener('click', (e)=>{ e.stopPropagation(); openViewer(); });

  if(isMobile){
    preview.addEventListener('touchend', (ev)=>{
      ev.stopPropagation();
      const shown = overlay.classList.contains('visible');
      if(_activePreviewOverlay && _activePreviewOverlay !== overlay){
        _activePreviewOverlay.classList.remove('visible'); _activePreviewOverlay = null;
      }
      if(shown){ openViewer(); }
      else {
        overlay.classList.add('visible'); _activePreviewOverlay = overlay;
        setTimeout(()=>{ if(overlay===_activePreviewOverlay){ overlay.classList.remove('visible'); _activePreviewOverlay=null; } }, 4000);
      }
    }, { passive: true });
    document.addEventListener('touchstart', (e)=>{
      if(!overlay.classList.contains('visible')) return;
      if(!preview.contains(e.target)){ overlay.classList.remove('visible'); if(_activePreviewOverlay===overlay) _activePreviewOverlay=null; }
    }, { passive: true });
  } else {
    preview.addEventListener('click', openViewer);
    preview.addEventListener('keydown', (e)=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); openViewer(); } });
  }

  preview.addEventListener('focusout', (e)=>{
    if(preview.contains(e.relatedTarget)) return;
    overlay.classList.remove('visible');
    if(_activePreviewOverlay===overlay) _activePreviewOverlay=null;
  });

  return card;
}

async function render(){
  gallery.innerHTML = '<div class="empty">Loading…</div>';
  try {
    const items = await dbGetAll();
    gallery.innerHTML = '';
    if(items.length === 0){
      gallery.appendChild(el('div', {className:'empty'}, 'No uploads yet — use the camera buttons above.'));
      return;
    }
    for(const it of items) gallery.appendChild(createCard(it));
  } catch(err){
    gallery.innerHTML = '';
    gallery.appendChild(el('div', {className:'empty'}, 'Could not load uploads: ' + err.message));
  }
}

async function handleFiles(fileList, type){
  if(!fileList || fileList.length === 0) return;
  const file = fileList[0];
  const title    = (titleInput.value||'').trim() || file.name || (type==='video'?'Video':'Photo');
  const uploader = (uploaderName.value||'').trim() || 'Anonymous';
  showUploadStatus('Uploading…', 0);
  try {
    const entry = await uploadToCloudinary(file, title, uploader, type, (p)=>{
      showUploadStatus(`Uploading… ${Math.round(p*100)}%`, p);
    });
    showUploadStatus('Saving…', 1);
    await dbAdd(entry);
    titleInput.value = '';
    render();
  } catch(err){
    alert('Upload failed: ' + err.message);
    console.error(err);
  } finally { hideUploadStatus(); }
}

captureImage.addEventListener('change', (e)=> handleFiles(e.target.files, 'image'));
captureVideo.addEventListener('change', (e)=> handleFiles(e.target.files, 'video'));

async function openCamera(mode){
  currentMode = mode;
  if(isMobile){
    if(mode==='photo'){ captureImage.value=''; captureImage.click(); return; }
    else { captureVideo.value=''; captureVideo.click(); return; }
  }
  takePhotoBtn.style.display   = mode==='photo' ? '' : 'none';
  startRecordBtn.style.display = mode==='video' ? '' : 'none';
  stopRecordBtn.style.display  = 'none';
  startRecordBtn.disabled = false;
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({ video:{facingMode:'environment'}, audio: mode==='video' });
    cameraStream.srcObject = mediaStream;
    cameraModal.classList.remove('hidden');
    cameraStream.play();
  } catch(err){ alert('Camera access denied or not available.'); console.error(err); }
}

function closeCamera(){
  cameraModal.classList.add('hidden');
  if(mediaRecorder && mediaRecorder.state==='recording') mediaRecorder.stop();
  if(mediaStream){ for(const t of mediaStream.getTracks()) t.stop(); mediaStream=null; }
  cameraStream.srcObject = null; recordedChunks = [];
}

takePhotoBtn.addEventListener('click', async ()=>{
  if(!mediaStream) return;
  const vt = mediaStream.getVideoTracks()[0];
  const s  = vt.getSettings();
  const w  = s.width  || cameraStream.videoWidth  || 1280;
  const h  = s.height || cameraStream.videoHeight || 720;
  captureCanvas.width = w; captureCanvas.height = h;
  captureCanvas.getContext('2d').drawImage(cameraStream, 0, 0, w, h);
  captureCanvas.toBlob(async (blob)=>{
    if(!blob) return;
    const title    = (titleInput.value||'').trim() || `Photo_${Date.now()}`;
    const uploader = (uploaderName.value||'').trim() || 'Anonymous';
    closeCamera();
    showUploadStatus('Uploading photo…', 0);
    try {
      const entry = await uploadToCloudinary(blob, title, uploader, 'image', (p)=>{
        showUploadStatus(`Uploading… ${Math.round(p*100)}%`, p);
      });
      showUploadStatus('Saving…', 1);
      await dbAdd(entry);
      titleInput.value = ''; render();
    } catch(err){ alert('Upload failed: '+err.message); }
    finally { hideUploadStatus(); }
  }, 'image/png');
});

startRecordBtn.addEventListener('click', ()=>{
  if(!mediaStream) return;
  recordedChunks = [];
  try { mediaRecorder = new MediaRecorder(mediaStream, {mimeType:'video/webm;codecs=vp9'}); }
  catch(e){ mediaRecorder = new MediaRecorder(mediaStream); }
  mediaRecorder.ondataavailable = (e)=>{ if(e.data && e.data.size) recordedChunks.push(e.data); };
  mediaRecorder.onstop = async ()=>{
    const blob = new Blob(recordedChunks, {type:'video/webm'});
    const title    = (titleInput.value||'').trim() || `Video_${Date.now()}`;
    const uploader = (uploaderName.value||'').trim() || 'Anonymous';
    closeCamera();
    showUploadStatus('Uploading video…', 0);
    try {
      const entry = await uploadToCloudinary(blob, title, uploader, 'video', (p)=>{
        showUploadStatus(`Uploading… ${Math.round(p*100)}%`, p);
      });
      showUploadStatus('Saving…', 1);
      await dbAdd(entry); titleInput.value = ''; render();
    } catch(err){ alert('Upload failed: '+err.message); }
    finally { hideUploadStatus(); }
  };
  mediaRecorder.start();
  startRecordBtn.disabled = true; stopRecordBtn.disabled = false; stopRecordBtn.style.display = '';
});

stopRecordBtn.addEventListener('click', ()=>{
  if(mediaRecorder && mediaRecorder.state==='recording') mediaRecorder.stop();
});

openCameraPhoto.addEventListener('click', ()=> openCamera('photo'));
openCameraVideo.addEventListener('click', ()=> openCamera('video'));
closeCameraBtn.addEventListener('click',  ()=> closeCamera());

clearAllBtn.addEventListener('click', async ()=>{
  if(!confirm('Delete ALL uploads from every device?')) return;
  try { await dbClearAll(); render(); }
  catch(err){ alert('Failed to clear: '+err.message); }
});

/* ── Viewer ── */
let currentViewerItem = null;
window.addEventListener('open-viewer', (e)=>{
  const item = e.detail;
  document.querySelectorAll('.preview-overlay.visible').forEach(o=>o.classList.remove('visible'));
  _activePreviewOverlay = null;
  document.body.classList.add('overlays-disabled');
  currentViewerItem = item;
  viewerMediaWrap.innerHTML = '';
  if(item.type==='video'){
    const v = document.createElement('video');
    v.src = item.url; v.controls = true; v.autoplay = false; v.playsInline = true;
    v.style.cssText = 'max-width:100%;max-height:60vh;object-fit:contain;display:block;';
    viewerMediaWrap.appendChild(v);
  } else {
    const img = document.createElement('img');
    img.src = item.url;
    img.style.cssText = 'max-width:100%;max-height:60vh;object-fit:contain;display:block;';
    viewerMediaWrap.appendChild(img);
  }
  viewerTitle.textContent    = item.title    || 'Untitled';
  viewerUploader.textContent = item.uploader || 'Anonymous';
  viewerModal.classList.remove('hidden');
});

viewerClose.addEventListener('click', closeViewer);
viewerModal.addEventListener('click', (e)=>{ if(e.target===viewerModal) closeViewer(); });

viewerDownload.addEventListener('click', ()=>{
  if(!currentViewerItem) return;
  const a = document.createElement('a');
  a.href = currentViewerItem.url;
  a.download = `${(currentViewerItem.title||'capture').replace(/\s+/g,'_')}.${currentViewerItem.type==='video'?'mp4':'jpg'}`;
  a.target = '_blank'; a.click();
});

viewerDelete.addEventListener('click', async ()=>{
  if(!currentViewerItem) return;
  if(!confirm('Delete this item?')) return;
  await dbDelete(currentViewerItem.public_id || currentViewerItem.publicId);
  closeViewer(); render();
});

function closeViewer(){
  viewerModal.classList.add('hidden');
  document.body.classList.remove('overlays-disabled');
  if(viewerMediaWrap.firstChild?.tagName==='VIDEO'){
    try{ viewerMediaWrap.firstChild.pause(); }catch(e){}
  }
  viewerMediaWrap.innerHTML = ''; currentViewerItem = null;
}

render();
  </script>
</body>
</html>
